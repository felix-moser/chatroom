<!doctype html>
<html>
  <head>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="mySidebar" class="sidebar">
      <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
      <button id="btnrooms", onclick="showRooms()">Rooms</button>
      <div id="roomsList"></div>
      <input id="usernameInput" type="text" placeholder="Username">
      <button id="btnaddroom" onclick="showAddRoom()">New Room</button>
      <div id="newRoomControls" class="hidden">
        <input id="roomnameInput" type="text" placeholder="Room name">
        <button id="btncreateRoom" onclick="addRoom()">Create Room</button>
      </div>
    </div>

    <div id="main">
      <button class="openbtn" onclick="openNav()">&#9776; Open Sidebar</button>
    <p id="roomname"></p>
      <div id="chat"></div>
      <div id="inputArea">
        <input id="messageInput" type="text" placeholder="Enter message here.">
        <button id="btnsend", onclick="sendMessage()">Send</button>
      </div>
    </div>
                                    
    <script src="script.js"></script>
  </body>
</html>
